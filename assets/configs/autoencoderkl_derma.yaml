# Architecture config for a KL-regularised autoencoder (VAE) trained on MNIST.
#
# Input : 64×64×3  (grayscale digit replicated to 3 channels)
# Latent: 4×8×8   (2 downsampling stages, f=4, z_channels=4)
#
# Training
# ────────
#   python train_vae.py --output_dir ./assests/checkpoints/derma_vae/multi --epochs 50
#
# The resulting checkpoint is consumed by ldm_mnist.yaml as first_stage_config.

data:
  name:  DermaMNIST
  # classes: ['basal cell carcinoma', 'benign keratosis-like lesions', 'melanoma', 'melanocytic nevi'] 
  classes: ['benign keratosis-like lesions', 'melanoma']
  undersample: False

model:
  base_learning_rate: 3e-4 #4.5e-6
  target: ldm.models.autoencoder.AutoencoderKL
  params:
    monitor: "val/rec_loss"
    embed_dim: 4

    lossconfig:
      target: ldm.modules.losses.LPIPSWithDiscriminator
      params:
        disc_start: 3000       # discriminator kicks in after 10 k steps
        kl_weight: 0.000001
        disc_weight: 0.5

    ddconfig:
      double_z: True
      z_channels: 4
      resolution: 64            # spatial resolution of the input
      in_channels: 3
      out_ch: 3
      ch: 64
      ch_mult: [1, 2, 2]        # 2 downsampling stages: 64 → 32 → 16
      num_res_blocks: 2
      attn_resolutions: [16]     # self-attention at 8×8
      dropout: 0.0
